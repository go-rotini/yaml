apiVersion: v1
kind: Pod
metadata:
  name: kyaml-test-pod
  namespace: default
  labels:
    app: kyaml-test
    tier: frontend
spec:
  containers:
  - name: nginx
    image: nginx:1.20
    ports:
    - containerPort: 80
      protocol: TCP
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
  restartPolicy: Always
