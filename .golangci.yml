version: "2"

linters:
  default: all
  disable:
    # Deprecated
    - wsl

    # Not applicable to this project
    - bodyclose
    - rowserrcheck
    - sqlclosecheck
    - noctx
    - spancheck
    - zerologlint
    - loggercheck
    - promlinter
    - protogetter
    - ginkgolinter
    - testifylint
    - sloglint
    - unqueryvet
    - arangolint
    - gosmopolitan

    # Too opinionated for a parser/encoder library
    - exhaustruct
    - varnamelen
    - wsl_v5
    - nlreturn
    - noinlineerr
    - godox
    - depguard
    - goheader
    - gomodguard
    - lll
    - gochecknoglobals
    - ireturn
    - nonamedreturns
    - paralleltest
    - tparallel
    - testpackage
    - mnd
    - funcorder
    - containedctx    # context in encoder/decoder structs is by design
    - tagliatelle     # struct tags use yaml-specific conventions, not generic casing
    - forbidigo       # fmt.Print usage in cmd/ is intentional
    - exhaustive      # switch exhaustiveness on internal token types is intentional

  settings:
    cyclop:
      max-complexity: 25

    gocognit:
      min-complexity: 40

    gocyclo:
      min-complexity: 25

    funlen:
      lines: 120
      statements: 80
      ignore-comments: true

    nestif:
      min-complexity: 10

    goconst:
      min-len: 3
      min-occurrences: 5

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - unnamedResult

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: var-declaration
        - name: var-naming

    errcheck:
      check-type-assertions: false
      check-blank: true

    gosec:
      excludes:
        - G304
        - G115

    nakedret:
      max-func-lines: 10

    misspell:
      locale: US

    interfacebloat:
      max: 5

    wrapcheck:
      ignore-interface-regexps:
        - "Unmarshaler"
        - "Marshaler"
        - "io\\.Writer"
      ignore-sig-regexps:
        - "TextUnmarshaler\\)\\.UnmarshalText"
        - "TextMarshaler\\)\\.MarshalText"
        - "io\\.Writer\\)\\.Write"
      ignore-package-globs:
        - "strconv"
        - "encoding/base64"

    perfsprint:
      strconcat: false

    godot:
      scope: toplevel

    maintidx:
      under: 15

    prealloc:
      simple: true
      for-loops: true

  exclusions:
    presets:
      - comments
      - common-false-positives
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - forcetypeassert
          - dupl
          - cyclop
          - gocognit
          - gocyclo
          - funlen
          - goconst
          - maintidx
          - wrapcheck
          - err113
          - exhaustive
          - makezero
          - unparam
          - nestif
          - godot
          - gocritic
          - prealloc
          - perfsprint
          - errorlint
          - inamedparam
          - embeddedstructfieldcheck
          - modernize
          - unconvert
          - revive
          - misspell
          - intrange
          - testableexamples
          - staticcheck

      - path: cmd/
        linters:
          - wrapcheck

      # Parser internals have inherent complexity
      - path: scanner\.go
        linters:
          - cyclop
          - gocognit
          - gocyclo
          - funlen
          - maintidx
          - nestif
          - unparam

      - path: parser\.go
        linters:
          - cyclop
          - gocognit
          - gocyclo
          - funlen
          - maintidx
          - nestif
          - nilnil

      - path: decode\.go
        linters:
          - cyclop
          - gocognit
          - gocyclo
          - funlen
          - maintidx
          - nilnil
          - nilerr
          - nestif

      - path: encode\.go
        linters:
          - cyclop
          - gocognit
          - gocyclo
          - funlen
          - maintidx
          - nestif

      - path: encoding\.go
        linters:
          - cyclop
          - gocyclo

      - path: unmarshal\.go
        linters:
          - cyclop
          - gocognit
          - nestif

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
