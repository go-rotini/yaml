name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.x'

      - name: Determine version
        uses: go-semantic-release/action@2e9dc4247a6004f8377781bef4cb9dad273a741f # v1
        id: semrel
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          dry: true

      - name: Promote CHANGELOG.md [Unreleased] section
        if: steps.semrel.outputs.version != ''
        env:
          VERSION: ${{ steps.semrel.outputs.version }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          if ! grep -qE '^## \[Unreleased\]$' CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing the '## [Unreleased]' section. Add the section back to maintain release-stamping."
            exit 1
          fi
          # Insert a versioned heading immediately after [Unreleased] so the
          # entries authored under [Unreleased] become the new release block.
          # The next [Unreleased] section starts empty for the following release.
          awk -v ver="$VERSION" -v date="$DATE" '
            /^## \[Unreleased\]$/ {
              print
              print ""
              print "## [" ver "] - " date
              next
            }
            { print }
          ' CHANGELOG.md > CHANGELOG.md.tmp
          mv CHANGELOG.md.tmp CHANGELOG.md

      - name: Commit CHANGELOG.md
        if: steps.semrel.outputs.version != ''
        env:
          VERSION: ${{ steps.semrel.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "CHANGELOG.md unchanged; skipping commit."
            exit 0
          fi
          git commit -m "chore(release): stamp CHANGELOG for v${VERSION} [skip ci]"
          git push origin HEAD:main

      - name: Generate SBOM
        if: steps.semrel.outputs.version != ''
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM provenance
        if: steps.semrel.outputs.version != ''
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: sbom.spdx.json

      - name: Create draft release
        if: steps.semrel.outputs.version != ''
        run: |
          gh release create v${{ steps.semrel.outputs.version }} \
            --draft \
            --generate-notes \
            sbom.spdx.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        if: steps.semrel.outputs.version != ''
        run: gh release edit v${{ steps.semrel.outputs.version }} --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
