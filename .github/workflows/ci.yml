name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        go-version: ['1.25.x', '1.26.x']
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Format check
        run: make fmt

      - name: Vet
        run: make vet

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Staticcheck
        run: make staticcheck

      - name: Clone YAML test suite
        run: make test-suite

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        if: matrix.go-version == '1.26.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Fuzz smoke test
        run: make fuzz

  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Clone YAML test suite
        run: make test-suite

      - name: YAML test suite conformance
        run: make test-verbose
